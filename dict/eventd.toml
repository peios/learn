# =============================================================================
# eventd — Peios Observability Daemon
# =============================================================================

[[terms]]
term = "eventd"
definition = "The Peios observability daemon. A userspace process that consumes events from KMES, ingests logs and metrics, and provides persistent storage and querying for all three data types."
category = "Daemon"
product = "eventd"

[[terms]]
term = "Event Store"
definition = "The persistent storage engine for KMES events. One or more SQLite shard databases containing structured event records with full KMES header metadata and identity stamps."
category = "Storage"
product = "eventd"

[[terms]]
term = "Log Store"
definition = "The persistent storage engine for log records. A single SQLite database containing timestamped text output from services."
category = "Storage"
product = "eventd"

[[terms]]
term = "Metric Store"
definition = "The persistent storage engine for metric data. A single SQLite database containing time-series numeric measurements organised by series (name + labels)."
category = "Storage"
product = "eventd"

[[terms]]
term = "Shard"
definition = "An independent SQLite database in the event store. Each shard has its own file, WAL, and writer thread. Shards share no write-path state. The number of shards is configurable."
category = "Storage"
product = "eventd"

[[terms]]
term = "Drain Thread"
definition = "A thread dedicated to reading events from one KMES per-CPU ring buffer. One drain thread per CPU. Drain threads copy events from the ring buffer and hand them off to writer threads."
category = "Ingestion"
product = "eventd"

[[terms]]
term = "Writer Thread"
definition = "A thread dedicated to writing events to one shard database. Owns the sole read-write SQLite connection for that shard. Receives events from one or more drain threads."
category = "Ingestion"
product = "eventd"

[[terms]]
term = "Adaptive Indexing"
definition = "A mechanism that monitors query patterns and dynamically creates or drops secondary indexes on event store columns and payload fields. Indexes are created during quiet periods and shed under write pressure to protect throughput."
category = "Storage"
product = "eventd"

[[terms]]
term = "Adaptive Rollup"
definition = "A mechanism that monitors metric query patterns and pre-computes aggregate values (averages, percentiles, rates) for frequently queried function/window combinations. Computed during quiet periods and transparent to queries."
category = "Storage"
product = "eventd"

[[terms]]
term = "Synthetic Event"
definition = "A record generated by eventd itself (not received from KMES). Stored in the events table with an event_type prefixed by 'synthetic.' (e.g., synthetic.startup, synthetic.gap). Does not have KMES header fields."
category = "Event Model"
product = "eventd"

[[terms]]
term = "Gap Record"
definition = "A synthetic event (event_type 'synthetic.gap') recording a detected sequence number gap on a CPU. Indicates lost events due to ring buffer overrun, event drops, or eventd restart."
category = "Event Model"
product = "eventd"

[[terms]]
term = "Boot ID"
definition = "A GUID assigned by peinit at each boot, used by eventd to partition data across boots. KMES per-CPU sequence numbers reset on each boot; the boot ID disambiguates."
category = "Lifecycle"
product = "eventd"

[[terms]]
term = "Log Record"
definition = "A single log entry consisting of a timestamp, origin (service name), error flag (stdout vs stderr), and message text. Ingested via the log socket as a msgpack-encoded datagram."
category = "Log Model"
product = "eventd"

[[terms]]
term = "Time Series"
definition = "A unique combination of metric name and label set. Each time series accumulates samples (timestamp + value) over time. Identified by a series ID in the metric store."
category = "Metric Model"
product = "eventd"

[[terms]]
term = "Rollup"
definition = "A pre-computed aggregate value for a time series, stored in the rollups table. Defined by a series, aggregation function, window size, and window start time."
category = "Metric Model"
product = "eventd"
